<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GK Guardian Habib</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

:root{
--themeColor:#ff003c;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
padding:12px;
}

.container{
max-width:390px;
margin:auto;
}

.card{
background:#070707;
border:2px solid var(--themeColor);
padding:14px;

box-shadow:
0 0 20px var(--themeColor);

transition:0.3s;
}

/* TOP LOGO */

.top-logo{
width:90px;
height:90px;

border-radius:50%;

margin:auto;
display:block;

object-fit:cover;

border:3px solid var(--themeColor);

box-shadow:
0 0 20px var(--themeColor);

transition:0.3s;
}

/* TITLE */

.title{
text-align:center;
font-size:24px;
margin-top:10px;
font-weight:bold;

color:var(--themeColor);

text-shadow:
0 0 10px var(--themeColor);

transition:0.3s;
}

.subtitle{
text-align:center;
font-size:11px;
letter-spacing:4px;
margin-top:5px;
color:#aaa;
}

/* FORM */

.input-box{
margin-top:16px;
}

label{
display:block;
margin-bottom:7px;
font-size:13px;
font-weight:bold;
color:#00d9ff;
}

input,
textarea,
select{
width:100%;
padding:13px;

background:#101010;

border:none;
outline:none;

border-radius:12px;

color:white;
font-size:13px;
}

textarea{
height:75px;
resize:none;
}

/* BUTTON */

.btn{
width:100%;
padding:15px;

border:none;
border-radius:14px;

font-size:15px;
font-weight:bold;

cursor:pointer;

margin-top:18px;
}

.generate-btn{
background:var(--themeColor);
color:white;

box-shadow:
0 0 18px var(--themeColor);

transition:0.3s;
}

.download-btn{
background:#00ff99;
color:black;
}

/* PREVIEW */

.preview{
margin-top:22px;

border:2px solid var(--themeColor);

background:#050505;

overflow:hidden;
position:relative;

box-shadow:
0 0 18px var(--themeColor);

transition:0.3s;
}

/* TOP BAR */

.preview-top{
height:50px;

background:
linear-gradient(
to right,
#111,
var(--themeColor),
#111
);

display:flex;
justify-content:space-between;
align-items:center;

padding:0 16px;

font-size:12px;
font-weight:bold;

letter-spacing:5px;

transition:0.3s;
}

/* WATERMARK */

.watermark{
position:absolute;

top:32%;
left:50%;

transform:translate(-50%,-50%);

display:flex;
justify-content:center;
align-items:center;

pointer-events:none;

z-index:10;
}

.watermark img{
width:100%;
height:100%;

object-fit:contain;

opacity:0.12;

filter:blur(1px);
}

/* DOUBLE IMAGE */

.double-image{
display:flex;
gap:4px;
padding:4px;
position:relative;
z-index:1;
}

.preview-image{
width:50%;
height:320px;

object-fit:cover;

border:2px solid var(--themeColor);

transition:0.3s;
}

/* BREAKING */

.breaking-badge{
display:inline-block;

margin:10px 0 0 10px;

padding:7px 15px;

background:var(--themeColor);

font-size:10px;
font-weight:bold;

letter-spacing:3px;

box-shadow:
0 0 10px var(--themeColor);

transition:0.3s;
}

.breaking{
padding:18px;

background:#140000;

font-size:20px;
font-weight:bold;

line-height:1.5;
}

/* NEWS BAR */

.news-bar{
height:48px;

display:flex;
justify-content:space-between;
align-items:center;

padding:0 14px;

background:#0d0d0d;

border-top:
2px solid var(--themeColor);

border-bottom:
2px solid var(--themeColor);

font-size:11px;
letter-spacing:3px;

color:#999;

transition:0.3s;
}

/* PROFILE */

.bottom{
display:flex;
align-items:center;
gap:14px;

padding:18px;

background:#060606;
}

.bottom img{
width:70px;
height:70px;

border-radius:14px;

object-fit:cover;

border:
2px solid var(--themeColor);

box-shadow:
0 0 12px var(--themeColor);

transition:0.3s;
}

.bottom h2{
font-size:18px;
margin-bottom:5px;
color:#00d9ff;
}

.bottom p{
font-size:12px;
color:#aaa;
}

/* FOOTER */

.footer-box{
padding:14px;

background:#0b0b0b;

border-top:
2px solid var(--themeColor);

font-size:13px;
color:#ccc;

transition:0.3s;
}

.footer{
text-align:center;
margin-top:14px;
font-size:11px;
color:#777;
}

.range-text{
margin-top:5px;
font-size:11px;
color:#888;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<img src="Gk Guardian Habib cyber.png"
class="top-logo">

<h1 class="title">
GK GUARDIAN HABIB
</h1>

<p class="subtitle">
CYBER PHOTO GENERATOR
</p>

<!-- HEADLINE -->

<div class="input-box">

<label>Headline</label>

<textarea id="headline">
এখানে আপনার ঘোষণার লেখা
</textarea>

</div>

<!-- CHANNEL -->

<div class="input-box">

<label>Channel Name</label>

<input type="text"
id="channel"
value="GK Guardian">

</div>

<!-- DESCRIPTION -->

<div class="input-box">

<label>Description</label>

<textarea id="desc">
আমরা ছায়ায় থাকি, শক্তিতে কথা বলি।
</textarea>

</div>

<!-- COLOR -->

<div class="input-box">

<label>Theme Color</label>

<select id="themeColor">

<option value="#ff003c">
🔴 Red
</option>

<option value="#00ff99">
🟢 Green
</option>

<option value="#00d9ff">
🔵 Blue
</option>

<option value="#ff9900">
🟠 Orange
</option>

<option value="#b300ff">
🟣 Purple
</option>

<option value="#ffff00">
🟡 Yellow
</option>

<option value="#ffffff">
⚪ White
</option>

<option value="#ff1493">
🌸 Pink
</option>

<option value="#00ffff">
💎 Cyan
</option>

<option value="#ff4500">
🔥 Deep Orange
</option>

<option value="#39ff14">
☢ Neon Green
</option>

<option value="#8a2be2">
🪻 Violet
</option>

</select>

</div>

<!-- WATERMARK -->

<div class="input-box">

<label>Enable Watermark</label>

<select id="watermarkToggle">

<option value="show">ON</option>
<option value="hide">OFF</option>

</select>

</div>

<div class="input-box">

<label>Watermark Size</label>

<input type="range"
id="watermarkSize"
min="50"
max="700"
value="220">

<div class="range-text">
Small ← → Large
</div>

</div>

<div class="input-box">

<label>Watermark Opacity</label>

<input type="range"
id="watermarkOpacity"
min="1"
max="100"
value="12">

<div class="range-text">
Light ← → Dark
</div>

</div>

<!-- LOGO SIZE -->

<div class="input-box">

<label>Logo Size</label>

<input type="range"
id="logoSize"
min="40"
max="250"
value="70">

<div class="range-text">
Small ← → Large
</div>

</div>

<!-- UPLOAD -->

<div class="input-box">

<label>Upload First Screenshot</label>

<input type="file"
id="upload1">

</div>

<div class="input-box">

<label>Upload Second Screenshot</label>

<input type="file"
id="upload2">

</div>

<div class="input-box">

<label>Upload Logo</label>

<input type="file"
id="logoUpload">

</div>

<!-- BUTTON -->

<button class="btn generate-btn"
onclick="generate()">

⚡ GENERATE DESIGN

</button>

<button class="btn download-btn"
id="downloadBtn">

💾 HD DOWNLOAD

</button>

<!-- PREVIEW -->

<div class="preview"
id="preview">

<div class="preview-top">

<div>LIVE</div>

<div>GK GUARDIAN</div>

<div>ACG</div>

</div>

<!-- WATERMARK -->

<div class="watermark"
id="watermark">

<img id="watermarkImg"
src="Gk Guardian Habib cyber.png">

</div>

<!-- DOUBLE IMAGE -->

<div class="double-image">

<img src="https://via.placeholder.com/300x400"
class="preview-image"
id="previewImg1">

<img src="https://via.placeholder.com/300x400"
class="preview-image"
id="previewImg2">

</div>

<!-- BREAKING -->

<div class="breaking-badge">

ACG BREAKING

</div>

<div class="breaking"
id="previewHeadline">

এখানে আপনার ঘোষণার লেখা

</div>

<!-- NEWS -->

<div class="news-bar">

<div>
17 / 05 / 2026
</div>

<div>
◼ BREAKING NEWS ◼
</div>

</div>

<!-- PROFILE -->

<div class="bottom">

<img src="Gk Guardian Habib cyber.png"
id="userLogo">

<div>

<h2 id="previewChannel">
GK Guardian
</h2>

<p id="previewDesc">
আমরা ছায়ায় থাকি, শক্তিতে কথা বলি।
</p>

</div>

</div>

<!-- FOOTER -->

<div class="footer-box">

🛡 Protected Design

</div>

</div>

<div class="footer">

GK GUARDIAN HABIB CYBER SYSTEM

</div>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

/* IMAGE 1 */

document.getElementById("upload1")
.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

document.getElementById("previewImg1").src=
e.target.result;

}

reader.readAsDataURL(file);

}

});

/* IMAGE 2 */

document.getElementById("upload2")
.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

document.getElementById("previewImg2").src=
e.target.result;

}

reader.readAsDataURL(file);

}

});

/* LOGO */

document.getElementById("logoUpload")
.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

document.getElementById("userLogo").src=
e.target.result;

document.querySelector(".top-logo").src=
e.target.result;

document.getElementById("watermarkImg").src=
e.target.result;

}

reader.readAsDataURL(file);

}

});

/* GENERATE */

function generate(){

/* TEXT */

document.getElementById("previewHeadline")
.innerText=
document.getElementById("headline").value;

document.getElementById("previewChannel")
.innerText=
document.getElementById("channel").value;

document.getElementById("previewDesc")
.innerText=
document.getElementById("desc").value;

/* THEME COLOR */

const color =
document.getElementById(
"themeColor"
).value;

document.documentElement
.style.setProperty(
"--themeColor",
color
);

/* WATERMARK */

const watermark =
document.getElementById("watermark");

const watermarkImg =
document.getElementById("watermarkImg");

/* SIZE */

const size =
document.getElementById("watermarkSize").value;

watermark.style.width =
size + "px";

watermark.style.height =
size + "px";

/* OPACITY */

const opacity =
document.getElementById("watermarkOpacity").value;

watermarkImg.style.opacity =
opacity / 100;

/* SHOW HIDE */

const toggle =
document.getElementById("watermarkToggle").value;

if(toggle=="hide"){

watermark.style.display="none";

}else{

watermark.style.display="flex";

}

/* LOGO SIZE */

const logoSize =
document.getElementById("logoSize").value;

const userLogo =
document.getElementById("userLogo");

userLogo.style.width =
logoSize + "px";

userLogo.style.height =
logoSize + "px";

alert("Design Generated!");

}

/* DOWNLOAD */

document.getElementById("downloadBtn")
.addEventListener("click",function(){

html2canvas(
document.getElementById("preview"))

.then(canvas=>{

let link=
document.createElement("a");

link.download=
"GK_Guardian_Habib_HD.png";

link.href=
canvas.toDataURL();

link.click();

});

});

</script>

</body>
</html>
