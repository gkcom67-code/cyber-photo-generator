<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Photo Generator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

:root{
--theme:#ff004c;
}

body{
background:#000;
color:#fff;
padding:20px;
overflow-x:hidden;
}

.container{
max-width:500px;
margin:auto;
}

.logo{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
display:block;
margin:auto;
border:4px solid var(--theme);
box-shadow:0 0 25px var(--theme);
}

.title{
text-align:center;
font-size:32px;
font-weight:bold;
margin-top:15px;
color:var(--theme);
text-shadow:0 0 15px var(--theme);
}

.subtitle{
text-align:center;
margin-top:8px;
font-size:15px;
color:#ccc;
}

.color-box{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:25px;
}

.color-btn{
height:50px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:bold;
color:#fff;
}

.red{background:#ff004c;}
.blue{background:#007bff;}
.green{background:#00c853;}
.purple{background:#a200ff;}
.orange{background:#ff6600;}
.pink{background:#ff1493;}

.preview{
margin-top:30px;
padding:20px;
border:2px solid var(--theme);
border-radius:20px;
background:#111;
box-shadow:0 0 25px var(--theme);
}

.preview img{
width:100%;
border-radius:15px;
border:3px solid var(--theme);
}

.preview-title{
text-align:center;
font-size:24px;
margin-bottom:20px;
color:var(--theme);
text-shadow:0 0 10px var(--theme);
}

.input-box{
margin-top:20px;
}

.input-box input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
outline:none;
background:#1c1c1c;
color:#fff;
font-size:16px;
border:2px solid var(--theme);
}

.btn{
width:100%;
padding:18px;
margin-top:20px;
border:none;
border-radius:15px;
font-size:20px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.generate{
background:var(--theme);
color:#fff;
box-shadow:0 0 20px var(--theme);
}

.download{
background:#00ff99;
color:#000;
font-weight:bold;
}

.btn:hover{
transform:scale(1.03);
}

.social-links{
text-align:center;
margin-top:30px;
}

.social-links a{
display:inline-block;
padding:12px 25px;
margin:5px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
font-size:17px;
color:#fff;
}

.facebook{
background:#1877f2;
}

.whatsapp{
background:#25d366;
}

.footer{
text-align:center;
margin-top:40px;
color:#888;
font-size:14px;
}

@media(max-width:600px){

.title{
font-size:26px;
}

.color-box{
grid-template-columns:repeat(2,1fr);
}

.logo{
width:100px;
height:100px;
}

}

</style>
</head>

<body>

<div class="container">

<img src="Gk Guardian Habib cyber.png" class="logo">

<div class="title">
CYBER PHOTO GENERATOR
</div>

<div class="subtitle">
Create Stylish Cyber Design Instantly
</div>

<div class="color-box">

<button class="color-btn red" onclick="changeColor('#ff004c')">
RED
</button>

<button class="color-btn blue" onclick="changeColor('#007bff')">
BLUE
</button>

<button class="color-btn green" onclick="changeColor('#00c853')">
GREEN
</button>

<button class="color-btn purple" onclick="changeColor('#a200ff')">
PURPLE
</button>

<button class="color-btn orange" onclick="changeColor('#ff6600')">
ORANGE
</button>

<button class="color-btn pink" onclick="changeColor('#ff1493')">
PINK
</button>

</div>

<div class="input-box">
<input type="text" placeholder="Enter Your Name">
</div>

<button class="btn generate">
⚡ GENERATE DESIGN
</button>

<button class="btn download" onclick="downloadImage()">
💾 HD DOWNLOAD
</button>

<div class="preview">

<div class="preview-title">
LIVE PREVIEW
</div>

<img id="previewImage"
src="https://i.imgur.com/8Km9tLL.jpeg">

</div>

<div class="social-links">

<a href="https://facebook.com/"
target="_blank"
class="facebook">
Facebook
</a>

<a href="https://wa.me/"
target="_blank"
class="whatsapp">
WhatsApp
</a>

</div>

<div class="footer">
© 2026 GK Guardian Habib
</div>

</div>

<script>

function changeColor(color){

document.documentElement.style.setProperty('--theme',color);

}

function downloadImage(){

const image=document.getElementById("previewImage").src;

const link=document.createElement("a");

link.href=image;

link.download="Cyber-Photo.png";

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

}

</script>

</body>
</html>
