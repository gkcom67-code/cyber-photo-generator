<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>GK Guardian Habib</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#050505;
color:white;
padding:12px;
}

.container{
max-width:360px;
margin:auto;
}

.card{
background:#0a0a0a;
border:2px solid #ff003c;
padding:14px;
box-shadow:0 0 15px #ff003c70;
}

.logo{
width:100px;
height:100px;
border-radius:50%;
display:block;
margin:auto;
object-fit:cover;
border:3px solid #00ff99;
box-shadow:0 0 15px #00ff99;
}

.title{
text-align:center;
margin-top:12px;
font-size:24px;
font-weight:bold;
color:#ff003c;
text-shadow:0 0 10px #ff003c;
}

.subtitle{
text-align:center;
margin-top:5px;
font-size:11px;
letter-spacing:3px;
color:#999;
}

.input-box{
margin-top:14px;
}

label{
display:block;
margin-bottom:7px;
font-size:12px;
font-weight:bold;
color:#00d9ff;
}

input,
textarea,
select{
width:100%;
padding:12px;
background:#111;
color:white;
border:none;
outline:none;
border-radius:10px;
font-size:13px;
}

textarea{
height:75px;
resize:none;
}

.preview{
margin-top:22px;
background:#050505;
border:2px solid #ff003c;
overflow:hidden;
position:relative;
box-shadow:0 0 12px #ff003c70;
}

.preview-top{
height:45px;

background:
linear-gradient(to right,
#400000,
#ff003c,
#400000);

display:flex;
justify-content:space-between;
align-items:center;

padding:0 14px;

font-size:11px;
font-weight:bold;

letter-spacing:4px;
}

/* WATERMARK */

.watermark{
position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:180px;
height:180px;

opacity:0.09;

filter:blur(0.5px);

pointer-events:none;

z-index:5;

display:flex;
justify-content:center;
align-items:center;
}

.watermark img{
width:100%;
height:100%;
object-fit:contain;
}

/* DOUBLE IMAGE */

.double-image{
display:flex;
gap:4px;
background:#111;
padding:4px;
position:relative;
z-index:1;
}

.preview-image{
width:50%;
height:260px;

object-fit:cover;

border:2px solid #ff003c;
}

/* BREAKING */

.breaking-badge{
display:inline-block;

margin:12px 0 0 12px;

background:#ff003c;

padding:6px 14px;

font-size:10px;
font-weight:bold;

letter-spacing:3px;
}

.breaking{
padding:16px;

font-size:22px;
font-weight:bold;

line-height:1.5;

background:#140000;

color:white;
}

/* NEWS BAR */

.news-bar{
height:45px;

background:#0d0d0d;

display:flex;
justify-content:space-between;
align-items:center;

padding:0 14px;

font-size:10px;
letter-spacing:3px;

color:#999;

border-top:2px solid #ff003c;
border-bottom:2px solid #ff003c;
}

/* PROFILE */

.bottom{
display:flex;
align-items:center;
gap:14px;

padding:16px;

background:#050505;
}

.bottom img{
width:60px;
height:60px;

border-radius:10px;

border:2px solid #ff003c;

object-fit:cover;
}

.bottom h2{
font-size:18px;
color:#00d9ff;
margin-bottom:5px;
}

.bottom p{
font-size:11px;
color:#999;
}

/* SOCIAL */

.social-area{
padding:14px;

background:#0b0b0b;

border-top:2px solid #ff003c;
}

.social-area p{
display:flex;
align-items:center;
gap:10px;

margin:8px 0;

font-size:12px;

color:#ccc;
}

.social-area i{
color:#ff003c;
}

/* BUTTON */

.btn{
width:100%;
padding:14px;
margin-top:16px;
border:none;
font-size:14px;
font-weight:bold;
cursor:pointer;
border-radius:12px;
}

.generate-btn{
background:#ff003c;
color:white;
}

.download-btn{
background:#00ff99;
color:black;
}

.range-value{
font-size:11px;
color:#999;
margin-top:5px;
}

.footer{
text-align:center;
margin-top:16px;
font-size:10px;
color:#777;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<img src="Gk Guardian Habib cyber.png"
class="logo">

<h1 class="title">
GK GUARDIAN HABIB
</h1>

<p class="subtitle">
CYBER PHOTO GENERATOR
</p>

<div class="input-box">

<label>Headline</label>

<textarea id="headline">
এখানে আপনার ঘোষণার লেখা
</textarea>

</div>

<div class="input-box">

<label>Channel Name</label>

<input type="text"
id="channel"
value="GK Guardian">

</div>

<div class="input-box">

<label>Description</label>

<textarea id="desc">
আমরা ছায়ায় থাকি, শক্তিতে কথা বলি।
</textarea>

</div>

<div class="input-box">

<label>Theme Color</label>

<select id="themeColor">

<option value="#ff003c">Red</option>
<option value="#00ff99">Green</option>
<option value="#00ccff">Blue</option>
<option value="#ff9900">Orange</option>
<option value="#9d00ff">Purple</option>

</select>

</div>

<div class="input-box">

<label>Enable Watermark</label>

<select id="watermarkToggle">

<option value="show">ON</option>

<option value="hide">OFF</option>

</select>

</div>

<div class="input-box">

<label>Watermark Size</label>

<input type="range"
id="watermarkSize"
min="80"
max="350"
value="180">

<div class="range-value">
Small ← → Large
</div>

</div>

<div class="input-box">

<label>Watermark Opacity</label>

<input type="range"
id="watermarkOpacity"
min="1"
max="20"
value="9">

<div class="range-value">
Light ← → Dark
</div>

</div>

<div class="input-box">

<label>Upload First Screenshot</label>

<input type="file"
id="upload1">

</div>

<div class="input-box">

<label>Upload Second Screenshot</label>

<input type="file"
id="upload2">

</div>

<div class="input-box">

<label>Upload Logo</label>

<input type="file"
id="logoUpload">

</div>

<button class="btn generate-btn"
onclick="generate()">

⚡ GENERATE DESIGN

</button>

<button class="btn download-btn"
id="downloadBtn">

💾 HD DOWNLOAD

</button>

<div class="preview"
id="preview">

<div class="preview-top">

<div>LIVE</div>

<div>GK GUARDIAN</div>

<div>ACG</div>

</div>

<div class="watermark"
id="watermark">

<img src="Gk Guardian Habib cyber.png">

</div>

<div class="double-image">

<img src="https://via.placeholder.com/250x300"
class="preview-image"
id="previewImg1">

<img src="https://via.placeholder.com/250x300"
class="preview-image"
id="previewImg2">

</div>

<div class="breaking-badge">
ACG BREAKING
</div>

<div class="breaking"
id="previewHeadline">

এখানে আপনার ঘোষণার লেখা

</div>

<div class="news-bar">

<div>
17 / 05 / 2026
</div>

<div>
◼ BREAKING NEWS ◼
</div>

</div>

<div class="bottom">

<img src="Gk Guardian Habib cyber.png"
id="userLogo">

<div>

<h2 id="previewChannel">
GK Guardian
</h2>

<p id="previewDesc">
আমরা ছায়ায় থাকি, শক্তিতে কথা বলি।
</p>

</div>

</div>

<div class="social-area">

<p>
<i class="fa-solid fa-shield"></i>
Protected Design
</p>

<p>
<i class="fa-brands fa-facebook"></i>

<a href="https://www.facebook.com/share/1baUSpqEnk/"
target="_blank"
style="color:white;text-decoration:none;">

Facebook Profile

</a>

</p>

<p>
<i class="fa-brands fa-whatsapp"></i>

<a href="https://wa.me/9609150448"
target="_blank"
style="color:white;text-decoration:none;">

WhatsApp Contact

</a>

</p>

</div>

</div>

<div class="footer">
GK GUARDIAN HABIB CYBER SYSTEM
</div>

</div>

</div>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<script>

document.getElementById("upload1")
.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

document.getElementById("previewImg1").src=
e.target.result;

}

reader.readAsDataURL(file);

}

});

document.getElementById("upload2")
.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

document.getElementById("previewImg2").src=
e.target.result;

}

reader.readAsDataURL(file);

}

});

document.getElementById("logoUpload")
.addEventListener("change",function(){

const file=this.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(e){

document.getElementById("userLogo").src=
e.target.result;

document.querySelector(".watermark img").src=
e.target.result;

}

reader.readAsDataURL(file);

}

});

function generate(){

document.getElementById("previewHeadline").innerText=
document.getElementById("headline").value;

document.getElementById("previewChannel").innerText=
document.getElementById("channel").value;

document.getElementById("previewDesc").innerText=
document.getElementById("desc").value;

const color=
document.getElementById("themeColor").value;

document.querySelector(".preview")
.style.borderColor=color;

document.querySelector(".breaking-badge")
.style.background=color;

}

document.getElementById("downloadBtn")
.addEventListener("click", function () {

const bottom =
document.querySelector(".bottom");

const social =
document.querySelector(".social-area");

const footer =
document.querySelector(".footer");

bottom.style.display = "none";
social.style.display = "none";
footer.style.display = "none";

html2canvas(document.getElementById("preview"),{
scale:3
}).then(canvas => {

let link = document.createElement("a");

link.download =
"GK_Guardian_Habib_HD.png";

link.href =
canvas.toDataURL("image/png");

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

bottom.style.display = "flex";
social.style.display = "block";
footer.style.display = "block";

});

});

</script>

</body>
</html>
